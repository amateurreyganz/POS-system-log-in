<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Ganzon's Smart POS | Login</title>

    <link rel="stylesheet" href="css/login.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="container">

    <div class="left">

        <div class="overlay">

            <h1>🛒 Ganzon's Smart POS</h1>

            <p>

                Inventory Management & Point of Sale System

            </p>

            <ul>

                <li>✔ Product Inventory</li>

                <li>✔ Sales Monitoring</li>

                <li>✔ Profit Reports</li>

                <li>✔ Cashier System</li>

                <li>✔ Secure Login</li>

            </ul>

        </div>

    </div>

    <div class="right">

        <div class="login-box">

            <h2>Welcome Back</h2>

            <p>Please login to continue</p>

            <form id="loginForm">

                <label>

                    Username

                </label>

                <input
                    type="text"
                    id="username"
                    placeholder="Enter username"
                    required>

                <label>

                    Password

                </label>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter password"
                    required>

                <div class="options">

                    <label>

                        <input
                            type="checkbox"
                            id="showPassword">

                        Show Password

                    </label>

                </div>

                <button type="submit">

                    Login

                </button>

            </form>

            <p class="account">

                Demo Account

            </p>

            <div class="demo">

                <p>

                    Username:
                    <b>kateganzon</b>

                </p>

                <p>

                    Password:
                    <b>kate2001</b>

                </p>

            </div>

        </div>

    </div>

</div>

<script src="js/login.js"></script>

</body>

</html>
